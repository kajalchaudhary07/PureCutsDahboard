<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open in PureCuts</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(180deg, #f3e8ff 0%, #faf5ff 100%);
        color: #1f1230;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: min(460px, 100%);
        background: #fff;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 10px 28px rgba(56, 25, 85, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #5f4b78;
        line-height: 1.45;
      }
      .pill {
        margin-top: 14px;
        display: inline-block;
        padding: 7px 10px;
        border-radius: 999px;
        background: #f4ebff;
        color: #6d28d9;
        font-weight: 600;
        font-size: 12px;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      a {
        text-decoration: none;
      }
      .btn {
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #6d28d9;
        color: white;
      }
      .secondary {
        background: #ede9fe;
        color: #4c1d95;
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: #7c6b95;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Open in PureCuts</h1>
      <p id="desc">We found a shared product link.</p>
      <span class="pill" id="pidPill">Product</span>
      <div class="actions">
        <a id="openAppLink" href="#"><button class="btn primary">Open in App</button></a>
        <a id="installLink" href="#"><button class="btn secondary">Install App</button></a>
      </div>
      <p class="hint">Tip: If you already have PureCuts installed, tapping <strong>Open in App</strong> should take you straight to the product.</p>
    </div>

    <script>
      (function () {
        const segments = window.location.pathname.split('/').filter(Boolean);
        const productId = segments[0] === 'p' && segments[1] ? decodeURIComponent(segments[1]) : '';

        const safeId = productId || 'unknown';
        const origin = window.location.origin;
        const appUrl = `${origin}/p/${encodeURIComponent(safeId)}`;
        const basePlayStoreUrl = 'https://play.google.com/store/apps/details?id=purecuts.in&hl=en_IN';
        const playStoreUrl = `${basePlayStoreUrl}&referrer=${encodeURIComponent(`pid_${safeId}`)}`;
        const isAndroid = /android/i.test(navigator.userAgent || '');

        const intentUrl = `intent://purecuts-11a7c.web.app/p/${encodeURIComponent(safeId)}#Intent;scheme=https;package=purecuts.in;S.browser_fallback_url=${encodeURIComponent(playStoreUrl)};end`;

        const openApp = document.getElementById('openAppLink');
        const install = document.getElementById('installLink');
        const desc = document.getElementById('desc');
        const pill = document.getElementById('pidPill');

        openApp.href = isAndroid ? intentUrl : appUrl;
        install.href = playStoreUrl;

        openApp.addEventListener('click', function () {
          if (!isAndroid) return;
          // In some Android browsers, assigning intent URL directly on click
          // improves reliability over plain href navigation.
          window.location.assign(intentUrl);
        });

        if (productId) {
          desc.textContent = 'A product was shared with you. Open it in the app for the best experience.';
          pill.textContent = `Product ID: ${productId}`;
        } else {
          desc.textContent = 'This shared link does not include a valid product id yet.';
          pill.textContent = 'Product ID missing';
        }
      })();
    </script>
  </body>
</html>
